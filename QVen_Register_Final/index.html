<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar QVen - Integrated</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="register-card">
            <div class="card-content">
                <div class="logo-section">
                    <img src="Logo-mono.png" alt="Logo QVen" class="logo-qven">
                </div>
                
                <div class="form-section">
                    <h2>Selamat Datang</h2>
                    <p class="subtitle">Masuk ke Akun untuk melanjutkan</p>

                    <form id="registerForm">
                        <div class="input-group">
                            <label>EMAIL</label>
                            <div class="input-wrapper">
                                <i class="fa-regular fa-envelope"></i>
                                <input type="email" placeholder="Masukkan Email Anda" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>NAME</label>
                            <div class="input-wrapper">
                                <i class="fa-regular fa-user"></i>
                                <input type="text" placeholder="Masukkan Nama Anda" required>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <label>NIK</label>
                            <div class="input-wrapper">
                                <i class="fa-regular fa-id-card"></i>
                                <input type="text" placeholder="Masukkan NIK Anda" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>LOKASI</label>
                            <div class="input-wrapper clickable" id="openMap">
                                <i class="fa-solid fa-location-dot"></i>
                                <input type="text" id="lokasiInput" placeholder="Klik untuk pilih lokasi" readonly required>
                                <i class="fa-solid fa-crosshairs right-icon"></i>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>VENDOR</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-store"></i>
                                <select required>
                                    <option value="" disabled selected>Pilih Vendor</option>
                                    <option>Vendor A</option>
                                    <option>Vendor B</option>
                                </select>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>INSTANSI</label>
                            
                            <!-- Dropdown Instansi (Awalnya disembunyikan) -->
                            <div class="input-wrapper" id="dropdownInstansiContainer" style="display: none; margin-bottom: 10px;">
                                <i class="fa-solid fa-building"></i>
                                <select id="selectInstansi">
                                    <option value="" disabled selected>Pilih Instansi</option>
                                    <option>Instansi A</option>
                                    <option>Instansi B</option>
                                </select>
                            </div>

                            <button type="button" class="btn-instansi" id="openInstansi">Apakah Anda Memiliki Instansi?</button>
                            
                            <!-- Teks Keterangan (Awalnya disembunyikan) -->
                            <p id="teksTanpaInstansi" style="display: none; text-align: center; font-size: 11px; font-weight: 600; color: #1e293b; margin-top: 8px;">
                                ANDA TIDAK TERDAFTAR DALAM INSTANSI
                            </p>
                        </div>

                        <div class="input-group">
                            <label>PASSWORD</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" placeholder="Masukkan Sandi Anda" required>
                            </div>
                        </div>

                        <button type="submit" class="register-btn">Daftar &rarr;</button>
                    </form>
                    <p class="login-link">Sudah Punya Akun ? <a href="../QVen_Login_Template/index.html">Masuk</a></p>
                </div>
            </div>
            <div class="card-footer">
                <p>Quality Vendor and Nutrition Makan Bergizi Gratis</p>
            </div>
        </div>
    </div>

    <!-- Modal Konfirmasi Instansi -->
    <div class="modal-overlay" id="instansiModal">
        <div class="modal-card mini-modal">
            <div class="modal-header">
                <div class="header-title">
                    <span class="dot"></span>
                    <h3>Instansi</h3>
                </div>
            </div>
            <div class="modal-body text-center">
                <div class="icon-warning-container">
                    <div class="circle-icon green">
                        <span>!</span>
                    </div>
                </div>
                <h4 class="question-text">Apakah Anda Memiliki Instansi</h4>
                <div class="button-row">
                    <button class="btn-yes" id="instansiYa">Ya</button>
                    <button class="btn-no" id="instansiTidak">Tidak</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Map -->
    <div class="modal-overlay" id="mapModal">
        <div class="modal-card map-modal-size">
            <div class="modal-header">
                <div class="header-title">
                    <span class="dot"></span>
                    <h3>Lokasi</h3>
                </div>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div id="map"></div>
            </div>
            <div class="modal-footer map-footer">
                <button class="btn-save-map" id="saveCoords">Simpan Kordinat</button>
                <button class="btn-cancel-map" id="cancelMap">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
